apiVersion: apps/v1
kind: Deployment
metadata:
  name: real-estate-web
  namespace: real-estate
spec:
  replicas: 2
  selector:
    matchLabels:
      app: real-estate-web
  template:
    metadata:
      labels:
        app: real-estate-web
    spec:
      containers:
        - name: web
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: real-estate-config
            - secretRef:
                name: real-estate-secrets
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
